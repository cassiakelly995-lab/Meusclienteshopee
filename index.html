<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clientes Shopee - Cassia Kelly</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--or:#FF6130;--dk:#0F0F0F;--s1:#1A1A1A;--s2:#242424;--bd:#2E2E2E;--tx:#F0F0F0;--mt:#888;--gr:#30D158;--tg:#2A1A0F}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--dk);color:var(--tx);font-family:"DM Sans",sans-serif}
header{background:var(--s1);border-bottom:1px solid var(--bd);padding:18px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-family:"Syne",sans-serif;font-weight:800;font-size:19px;color:var(--or)}
.logo span{color:var(--tx)}
.badge{background:var(--tg);border:1px solid var(--or);color:var(--or);font-size:11px;padding:4px 12px;border-radius:20px}
.stats{display:flex;border-bottom:1px solid var(--bd)}
.stat{flex:1;padding:16px 24px;border-right:1px solid var(--bd)}
.stat:last-child{border-right:none}
.stat-n{font-family:"Syne",sans-serif;font-size:28px;font-weight:800;color:var(--or);line-height:1;margin-bottom:3px}
.stat-l{font-size:11px;color:var(--mt);text-transform:uppercase;letter-spacing:.5px}
.controls{padding:12px 24px;display:flex;gap:10px;align-items:center;border-bottom:1px solid var(--bd)}
.sw{flex:1;position:relative}
.sw svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--mt)}
#si{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:10px 14px 10px 38px;color:var(--tx);font-family:"DM Sans",sans-serif;font-size:14px;outline:none;transition:border-color .2s}
#si:focus{border-color:var(--or)}
#si::placeholder{color:var(--mt)}
.fb{background:var(--s2);border:1px solid var(--bd);color:var(--mt);padding:9px 16px;border-radius:10px;font-size:13px;cursor:pointer;font-family:"DM Sans",sans-serif;transition:all .2s;white-space:nowrap}
.fb.active{background:var(--or);border-color:var(--or);color:#fff}
.fb:hover:not(.active){border-color:var(--or);color:var(--or)}
.ri{padding:8px 24px;font-size:13px;color:var(--mt);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.ri strong{color:var(--tx)}
#lc{overflow-y:auto;max-height:calc(100vh - 255px)}
#lc::-webkit-scrollbar{width:3px}
#lc::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
a.row{display:flex;align-items:center;padding:13px 24px;border-bottom:1px solid var(--bd);text-decoration:none;color:var(--tx);transition:background .15s}
a.row:hover{background:var(--s2)}
.av{width:40px;height:40px;border-radius:50%;background:var(--tg);border:1.5px solid var(--or);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--or);flex-shrink:0;margin-right:14px;font-family:"Syne",sans-serif}
.info{flex:1}
.ph{font-size:15px;font-weight:500}
.sub{font-size:11px;color:var(--mt);margin-top:2px}
.wai{width:36px;height:36px;border-radius:50%;background:#25D366;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pg{padding:14px 24px;display:flex;align-items:center;justify-content:center;gap:5px;border-top:1px solid var(--bd);flex-wrap:wrap}
.pb{background:var(--s2);border:1px solid var(--bd);color:var(--tx);width:34px;height:34px;border-radius:7px;font-size:13px;cursor:pointer;font-family:"DM Sans",sans-serif;transition:all .2s;display:flex;align-items:center;justify-content:center}
.pb.active{background:var(--or);border-color:var(--or);color:#fff;font-weight:700}
.pb:hover:not(.active):not(:disabled){border-color:var(--or)}
.pb:disabled{opacity:.3;cursor:not-allowed}
</style>
</head>

<header>
  <div class="logo">Shopee<span>Clientes</span></div>
  <div class="badge">Cassia Kelly</div>
</header>
<div class="stats">
  <div class="stat"><div class="stat-n" id="sT">0</div><div class="stat-l">Total</div></div>
  <div class="stat"><div class="stat-n" id="sF">0</div><div class="stat-l">Exibindo</div></div>
  <div class="stat"><div class="stat-n" id="sS">0</div><div class="stat-l">Favoritos</div></div>
</div>
<div class="controls">
  <div class="sw">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="si" type="text" placeholder="Buscar por DDD ou numero...">
  </div>
  <button class="fb active" data-f="all">Todos</button>
  <button class="fb" data-f="starred">Favoritos</button>
</div>
<div class="ri"><span id="rT">-</span><span id="pT"></span></div>
<div id="lc"></div>
<div class="pg" id="pg"></div>
<script>
var C=JSON.parse(document.getElementById('jdata').textContent);
var PP=50,fil=[],pg=1,flt='all';
function start(){
  document.getElementById('sT').textContent=C.length.toLocaleString('pt-BR');
  document.getElementById('sS').textContent=C.filter(function(c){return c.starred;}).length;
  doFilter();
}
function doFilter(){
  var q=document.getElementById('si').value.toLowerCase().trim();
  fil=C.filter(function(c){
    return (!q||c.phone.toLowerCase().indexOf(q)>=0)&&(flt==='all'||(flt==='starred'&&c.starred));
  });
  pg=1; doRender();
}
function doRender(){
  var tot=fil.length,tp=Math.max(1,Math.ceil(tot/PP)),s=(pg-1)*PP,items=fil.slice(s,s+PP);
  document.getElementById('sF').textContent=tot.toLocaleString('pt-BR');
  document.getElementById('rT').innerHTML='<strong>'+tot.toLocaleString('pt-BR')+'</strong> contatos';
  document.getElementById('pT').textContent=tp>1?'Pag '+pg+'/'+tp:'';
  var lc=document.getElementById('lc'),rows=[];
  if(!items.length){lc.innerHTML='<div style="text-align:center;padding:40px;color:#888">Nenhum resultado</div>';document.getElementById('pg').innerHTML='';return;}
  for(var i=0;i<items.length;i++){
    var c=items[i];
    var nums=c.phone.replace(/[^0-9]/g,'');
    var ddd=nums.substring(0,2);
    var wa='https://wa.me/55'+nums;
    rows.push('<a href="'+wa+'" target="_blank" class="row">'+'<div class="av">'+ddd+'</div>'+'<div class="info"><div class="ph">'+(c.starred?'⭐ ':'')+c.phone+'</div><div class="sub">Toque para abrir WhatsApp</div></div>'+'<div class="wai"><svg width="18" height="18" fill="white" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M11.999 2.001c-5.514 0-9.998 4.484-9.998 9.999 0 1.762.463 3.413 1.27 4.847L2 22l5.29-1.251A9.957 9.957 0 0 0 12 21.999c5.514 0 9.999-4.485 9.999-10C21.999 6.485 17.514 2 12 2z"/></svg></div></a>');
  }
  lc.innerHTML=rows.join('');
  doPg(tp);
}
function doPg(tp){
  var p=document.getElementById('pg');
  if(tp<=1){p.innerHTML='';return;}
  var btns=[],ps=[],i;
  btns.push('<button class="pb" onclick="gp('+(pg-1)+')" '+(pg===1?'disabled':'')+'>&#8249;</button>');
  if(tp<=7){for(i=1;i<=tp;i++)ps.push(i);}
  else{ps=[1,2];if(pg>4)ps.push(-1);for(i=Math.max(3,pg-1);i<=Math.min(tp-2,pg+1);i++)ps.push(i);if(pg<tp-3)ps.push(-1);ps.push(tp-1,tp);}
  for(i=0;i<ps.length;i++){
    var x=ps[i];
    if(x===-1)btns.push('<span style="color:#888;padding:0 4px">...</span>');
    else btns.push('<button class="pb'+(x===pg?' active':'')+('" onclick="gp(')+x+(')">'+x+'</button>'));
  }
  btns.push('<button class="pb" onclick="gp('+(pg+1)+')" '+(pg===tp?'disabled':'')+'>&#8250;</button>');
  p.innerHTML=btns.join('');
}
function gp(x){var tp=Math.ceil(fil.length/PP);if(x<1||x>tp)return;pg=x;document.getElementById('lc').scrollTop=0;doRender();}
document.querySelectorAll('.fb').forEach(function(b){
  b.addEventListener('click',function(){
    document.querySelectorAll('.fb').forEach(function(x){x.classList.remove('active');});
    b.classList.add('active');flt=b.dataset.f;doFilter();
  });
});
document.getElementById('si').addEventListener('input',doFilter);
start();

</script>
