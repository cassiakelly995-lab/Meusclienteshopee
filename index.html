<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clientes Shopee — Cassia Kelly</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--orange:#FF6130;--dark:#0F0F0F;--surface:#1A1A1A;--surface2:#242424;--border:#2E2E2E;--text:#F0F0F0;--muted:#888;--green:#30D158;--tag:#2A1A0F}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--dark);color:var(--text);font-family:"DM Sans",sans-serif}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:18px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-family:"Syne",sans-serif;font-weight:800;font-size:19px;color:var(--orange)}
.logo span{color:var(--text)}
.badge{background:var(--tag);border:1px solid var(--orange);color:var(--orange);font-size:11px;padding:4px 12px;border-radius:20px}
.stats{display:flex;border-bottom:1px solid var(--border)}
.stat{flex:1;padding:16px 24px;border-right:1px solid var(--border)}
.stat:last-child{border-right:none}
.stat-n{font-family:"Syne",sans-serif;font-size:28px;font-weight:800;color:var(--orange);line-height:1;margin-bottom:3px}
.stat-l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.controls{padding:12px 24px;display:flex;gap:10px;align-items:center;border-bottom:1px solid var(--border)}
.sw{flex:1;position:relative}
.sw svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted)}
#si{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px 10px 38px;color:var(--text);font-family:"DM Sans",sans-serif;font-size:14px;outline:none;transition:border-color .2s}
#si:focus{border-color:var(--orange)}
#si::placeholder{color:var(--muted)}
.fb{background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:9px 16px;border-radius:10px;font-size:13px;cursor:pointer;font-family:"DM Sans",sans-serif;transition:all .2s;white-space:nowrap}
.fb.active{background:var(--orange);border-color:var(--orange);color:#fff}
.fb:hover:not(.active){border-color:var(--orange);color:var(--orange)}
.ri{padding:8px 24px;font-size:13px;color:var(--muted);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.ri strong{color:var(--text)}
.lc{overflow-y:auto}
.lc::-webkit-scrollbar{width:3px}
.lc::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.ci{display:flex;align-items:center;padding:13px 24px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;text-decoration:none;color:inherit}
.ci:hover{background:var(--surface2)}
.av{width:40px;height:40px;border-radius:50%;background:var(--tag);border:1.5px solid var(--orange);display:flex;align-items:center;justify-content:center;font-family:"Syne",sans-serif;font-weight:700;font-size:13px;color:var(--orange);flex-shrink:0;margin-right:14px}
.ph{font-size:15px;font-weight:500;letter-spacing:.3px}
.dd{font-size:11px;color:var(--muted);margin-top:2px}
.wa-icon{margin-left:auto;background:#25D366;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.es{text-align:center;padding:50px 24px;color:var(--muted)}
.pg{padding:14px 24px;display:flex;align-items:center;justify-content:center;gap:5px;border-top:1px solid var(--border);flex-wrap:wrap}
.pb{background:var(--surface2);border:1px solid var(--border);color:var(--text);width:34px;height:34px;border-radius:7px;font-size:13px;cursor:pointer;font-family:"DM Sans",sans-serif;transition:all .2s;display:flex;align-items:center;justify-content:center}
.pb.active{background:var(--orange);border-color:var(--orange);color:#fff;font-weight:700}
.pb:hover:not(.active):not(:disabled){border-color:var(--orange)}
.pb:disabled{opacity:.3;cursor:not-allowed}
.pi{font-size:13px;color:var(--muted);padding:0 3px}
.toast{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--green);color:var(--green);padding:10px 18px;border-radius:10px;font-size:13px;font-weight:500;opacity:0;transform:translateY(8px);transition:all .3s;z-index:999;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
</style>
</head>

var PP=50,fil=[],pg=1,flt="all";

function start(){
  document.getElementById("sT").textContent=C.length.toLocaleString("pt-BR");
  document.getElementById("sS").textContent=C.filter(function(c){return c.starred}).length;
  filter();
}

function filter(){
  var q=document.getElementById("si").value.toLowerCase().trim();
  fil=C.filter(function(c){
    var ms=!q||c.phone.toLowerCase().includes(q);
    var mf=flt==="all"||(flt==="starred"&&c.starred);
    return ms&&mf;
  });
  pg=1;
  render();
}

function render(){
  var tot=fil.length,tp=Math.max(1,Math.ceil(tot/PP)),s=(pg-1)*PP,items=fil.slice(s,s+PP);
  document.getElementById("sF").textContent=tot.toLocaleString("pt-BR");
  document.getElementById("rT").innerHTML="<strong>"+tot.toLocaleString("pt-BR")+"</strong> contatos";
  document.getElementById("pT").textContent=tp>1?"Pág "+pg+"/"+tp:"";
  var lc=document.getElementById("lc"),h="";
  if(!items.length){lc.innerHTML='<div class="es">Nenhum resultado</div>';document.getElementById("pg").innerHTML="";return;}
  for(var i=0;i<items.length;i++){
    var c=items[i];
    var ddd=(c.phone.match(/\((\d+)\)/)||[])[1]||"";
    var ini=ddd.slice(-2)||"??";
    var wa="https://wa.me/55"+c.phone.replace(/\D/g,"");
    var star=c.starred?'<span style="margin-right:8px;font-size:14px">⭐</span>':"";
    h+='<a href="'+wa+'" target="_blank" class="ci">'+
      '<div class="av">'+ini+'</div>'+
      '<div>'+
        '<div class="ph">'+star+c.phone+'</div>'+
        '<div class="dd">DDD '+ddd+' &bull; Toque para abrir WhatsApp</div>'+
      '</div>'+
      '<div class="wa-icon">'+
        '<svg width="18" height="18" fill="white" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M11.999 2.001c-5.514 0-9.998 4.484-9.998 9.999 0 1.762.463 3.413 1.27 4.847L2 22l5.29-1.251A9.957 9.957 0 0 0 12 21.999c5.514 0 9.999-4.485 9.999-10C21.999 6.485 17.514 2 12 2z"/></svg>'+
      '</div>'+
    '</a>';
  }
  lc.innerHTML=h;
  drawPg(tp);
}

function drawPg(tp){
  var p=document.getElementById("pg");
  if(tp<=1){p.innerHTML="";return;}
  var b='<button class="pb" onclick="gp(''+(pg-1)+'')" '+(pg===1?"disabled":"")+'>&#8249;</button>';
  var ps=[];
  if(tp<=7){for(var i=1;i<=tp;i++)ps.push(i);}
  else{ps=[1,2];if(pg>4)ps.push("...");for(var i=Math.max(3,pg-1);i<=Math.min(tp-2,pg+1);i++)ps.push(i);if(pg<tp-3)ps.push("...");ps.push(tp-1,tp);}
  ps.forEach(function(x){
    if(x==="...")b+='<span class="pi">…</span>';
    else b+='<button class="pb'+(x===pg?" active":"")+'" onclick="gp('+x+')">'+x+'</button>';
  });
  b+='<button class="pb" onclick="gp(''+(pg+1)+'')" '+(pg===tp?"disabled":"")+'>&#8250;</button>';
  p.innerHTML=b;
}

function gp(x){var tp=Math.ceil(fil.length/PP);if(x<1||x>tp)return;pg=x;document.getElementById("lc").scrollTop=0;render();}

document.querySelectorAll(".fb").forEach(function(b){
  b.addEventListener("click",function(){
    document.querySelectorAll(".fb").forEach(function(x){x.classList.remove("active");});
    b.classList.add("active");flt=b.dataset.f;filter();
  });
});
