<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clientes Shopee — Cassia Kelly</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #FF6130;
    --dark: #0F0F0F;
    --surface: #1A1A1A;
    --surface2: #242424;
    --border: #2E2E2E;
    --text: #F0F0F0;
    --muted: #888;
    --green: #30D158;
    --tag-bg: #2A1A0F;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background: var(--dark); color: var(--text); font-family: "DM Sans", sans-serif; min-height: 100vh; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-family: "Syne", sans-serif; font-weight: 800; font-size: 20px; color: var(--orange); }
  .logo span { color: var(--text); font-weight: 400; }
  .header-badge { background: var(--tag-bg); border: 1px solid var(--orange); color: var(--orange); font-size: 12px; padding: 4px 12px; border-radius: 20px; }

  .stats-bar { display: flex; border-bottom: 1px solid var(--border); }
  .stat { flex: 1; padding: 20px 32px; border-right: 1px solid var(--border); }
  .stat:last-child { border-right: none; }
  .stat-num { font-family: "Syne", sans-serif; font-size: 32px; font-weight: 800; color: var(--orange); line-height: 1; margin-bottom: 4px; }
  .stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

  .controls { padding: 16px 32px; display: flex; gap: 12px; align-items: center; border-bottom: 1px solid var(--border); }
  .search-wrap { flex: 1; position: relative; }
  .search-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); }
  #searchInput {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 11px 16px 11px 42px;
    color: var(--text); font-family: "DM Sans", sans-serif; font-size: 14px; outline: none;
    transition: border-color 0.2s;
  }
  #searchInput:focus { border-color: var(--orange); }
  #searchInput::placeholder { color: var(--muted); }

  .filter-btn {
    background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
    padding: 10px 18px; border-radius: 10px; font-size: 13px; cursor: pointer;
    font-family: "DM Sans", sans-serif; transition: all 0.2s; white-space: nowrap;
  }
  .filter-btn.active { background: var(--orange); border-color: var(--orange); color: white; }
  .filter-btn:hover:not(.active) { border-color: var(--orange); color: var(--orange); }

  .results-info { padding: 10px 32px; font-size: 13px; color: var(--muted); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .results-info strong { color: var(--text); }

  .list-container { max-height: calc(100vh - 280px); overflow-y: auto; }
  .list-container::-webkit-scrollbar { width: 4px; }
  .list-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .contact-item { display: flex; align-items: center; justify-content: space-between; padding: 13px 32px; border-bottom: 1px solid var(--border); transition: background 0.15s; }
  .contact-item:hover { background: var(--surface2); }
  .contact-left { display: flex; align-items: center; gap: 14px; }
  .contact-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--tag-bg); border: 1.5px solid var(--orange); display: flex; align-items: center; justify-content: center; font-family: "Syne", sans-serif; font-weight: 700; font-size: 13px; color: var(--orange); flex-shrink: 0; }
  .contact-phone { font-size: 15px; font-weight: 500; cursor: pointer; letter-spacing: 0.3px; }
  .contact-phone:hover { color: var(--orange); }
  .contact-ddd { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .contact-actions { display: flex; gap: 8px; align-items: center; }
  .btn-whatsapp { background: #25D366; color: white; border: none; padding: 7px 14px; border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: "DM Sans", sans-serif; display: flex; align-items: center; gap: 5px; transition: opacity 0.2s; text-decoration: none; }
  .btn-whatsapp:hover { opacity: 0.85; }
  .badge-star { font-size: 15px; }

  .loading { text-align: center; padding: 60px 32px; color: var(--muted); }
  .loading-spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--orange); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty-state { text-align: center; padding: 60px 32px; color: var(--muted); }

  .pagination { padding: 16px 32px; display: flex; align-items: center; justify-content: center; gap: 6px; border-top: 1px solid var(--border); flex-wrap: wrap; }
  .page-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); width: 34px; height: 34px; border-radius: 8px; font-size: 13px; cursor: pointer; font-family: "DM Sans", sans-serif; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
  .page-btn.active { background: var(--orange); border-color: var(--orange); color: white; font-weight: 600; }
  .page-btn:hover:not(.active):not(:disabled) { border-color: var(--orange); }
  .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .page-info { font-size: 13px; color: var(--muted); padding: 0 4px; }

  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--green); color: var(--green); padding: 12px 20px; border-radius: 12px; font-size: 14px; font-weight: 500; opacity: 0; transform: translateY(10px); transition: all 0.3s; z-index: 999; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateY(0); }

  @media (max-width: 600px) {
    header { padding: 14px 16px; }
    .stat { padding: 14px 16px; }
    .stat-num { font-size: 24px; }
    .controls { padding: 12px 16px; flex-wrap: wrap; }
    .contact-item { padding: 12px 16px; }
    .results-info { padding: 8px 16px; }
    .list-container { max-height: calc(100vh - 340px); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Shopee<span>Clientes</span></div>
  <div class="header-badge">Cassia Kelly</div>
</header>

<div class="stats-bar">
  <div class="stat"><div class="stat-num" id="totalCount">—</div><div class="stat-label">Total de Contatos</div></div>
  <div class="stat"><div class="stat-num" id="filteredCount">—</div><div class="stat-label">Exibindo</div></div>
  <div class="stat"><div class="stat-num" id="starredCount">—</div><div class="stat-label">Favoritos ⭐</div></div>
</div>

<div class="controls">
  <div class="search-wrap">
    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="searchInput" type="text" placeholder="Buscar por número ou DDD...">
  </div>
  <button class="filter-btn active" data-filter="all">Todos</button>
  <button class="filter-btn" data-filter="starred">⭐ Favoritos</button>
</div>

<div class="results-info">
  <span id="resultsText">Carregando...</span>
  <span id="pageText"></span>
</div>

<div class="list-container" id="listContainer">
  <div class="loading">
    <div class="loading-spinner"></div>
    <p>Carregando contatos...</p>
  </div>
</div>
<div class="pagination" id="pagination"></div>
<div class="toast" id="toast">✓ Número copiado!</div>

<!-- Carrega os contatos do arquivo data.js -->
<script src="data.js"></script>
<script>
const PER_PAGE = 50;
let filtered = [];
let currentPage = 1;
let activeFilter = "all";

function getInitials(phone) {
  const ddd = phone.match(/\((\d+)\)/);
  return ddd ? ddd[1].slice(-2) : "??";
}

function formatWhatsApp(phone) {
  return "https://wa.me/55" + phone.replace(/[^0-9]/g, "");
}

function applyFilters() {
  const q = document.getElementById("searchInput").value.toLowerCase();
  filtered = ALL_CONTACTS.filter(function(c) {
    var matchSearch = c.phone.toLowerCase().includes(q);
    var matchFilter = activeFilter === "all" || (activeFilter === "starred" && c.starred);
    return matchSearch && matchFilter;
  });
  currentPage = 1;
  render();
}

function render() {
  var total = filtered.length;
  var totalPages = Math.max(1, Math.ceil(total / PER_PAGE));
  var start = (currentPage - 1) * PER_PAGE;
  var pageItems = filtered.slice(start, start + PER_PAGE);

  document.getElementById("totalCount").textContent = ALL_CONTACTS.length.toLocaleString("pt-BR");
  document.getElementById("filteredCount").textContent = total.toLocaleString("pt-BR");
  document.getElementById("starredCount").textContent = ALL_CONTACTS.filter(function(c){ return c.starred; }).length;
  document.getElementById("resultsText").innerHTML = "<strong>" + total.toLocaleString("pt-BR") + "</strong> contatos encontrados";
  document.getElementById("pageText").textContent = "Página " + currentPage + " de " + totalPages;

  var container = document.getElementById("listContainer");

  if (pageItems.length === 0) {
    container.innerHTML = '<div class="empty-state"><p>Nenhum contato encontrado</p></div>';
  } else {
    var html = "";
    pageItems.forEach(function(c) {
      var initials = getInitials(c.phone);
      var waLink = formatWhatsApp(c.phone);
      var dddMatch = c.phone.match(/\((\d+)\)/);
      var dddLabel = dddMatch ? "DDD " + dddMatch[1] : "";
      var starBadge = c.starred ? '<span class="badge-star">⭐</span>' : "";
      html += '<div class="contact-item">' +
        '<div class="contact-left">' +
          '<div class="contact-avatar">' + initials + '</div>' +
          '<div>' +
            '<div class="contact-phone" onclick="copyPhone(\'' + c.phone.replace(/'/g, "\\'") + '\')" title="Clique para copiar">' + c.phone + '</div>' +
            '<div class="contact-ddd">' + dddLabel + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="contact-actions">' +
          starBadge +
          '<a href="' + waLink + '" target="_blank" class="btn-whatsapp">' +
            '<svg width="13" height="13" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M11.999 2.001c-5.514 0-9.998 4.484-9.998 9.999 0 1.762.463 3.413 1.27 4.847L2 22l5.29-1.251A9.957 9.957 0 0 0 12 21.999c5.514 0 9.999-4.485 9.999-10C21.999 6.485 17.514 2 12 2z"/></svg>' +
            'WhatsApp' +
          '</a>' +
        '</div>' +
      '</div>';
    });
    container.innerHTML = html;
  }
  renderPagination(totalPages);
}

function renderPagination(totalPages) {
  var pag = document.getElementById("pagination");
  if (totalPages <= 1) { pag.innerHTML = ""; return; }
  var btns = '<button class="page-btn" onclick="goPage(' + (currentPage-1) + ')" ' + (currentPage===1?"disabled":"") + '>&#8249;</button>';
  var pages = [];
  if (totalPages <= 7) { for (var i=1;i<=totalPages;i++) pages.push(i); }
  else {
    pages = [1,2];
    if (currentPage > 4) pages.push("...");
    for (var i=Math.max(3,currentPage-1);i<=Math.min(totalPages-2,currentPage+1);i++) pages.push(i);
    if (currentPage < totalPages-3) pages.push("...");
    pages.push(totalPages-1, totalPages);
  }
  pages.forEach(function(p) {
    if (p === "...") btns += '<span class="page-info">…</span>';
    else btns += '<button class="page-btn ' + (p===currentPage?"active":"") + '" onclick="goPage(' + p + ')">' + p + '</button>';
  });
  btns += '<button class="page-btn" onclick="goPage(' + (currentPage+1) + ')" ' + (currentPage===totalPages?"disabled":"") + '>&#8250;</button>';
  pag.innerHTML = btns;
}

function goPage(p) {
  var totalPages = Math.ceil(filtered.length / PER_PAGE);
  if (p < 1 || p > totalPages) return;
  currentPage = p;
  window.scrollTo(0, 0);
  render();
}

function copyPhone(phone) {
  navigator.clipboard.writeText(phone).then(function() {
    var t = document.getElementById("toast");
    t.classList.add("show");
    setTimeout(function(){ t.classList.remove("show"); }, 2000);
  });
}

document.querySelectorAll(".filter-btn").forEach(function(btn) {
  btn.addEventListener("click", function() {
    document.querySelectorAll(".filter-btn").forEach(function(b){ b.classList.remove("active"); });
    btn.classList.add("active");
    activeFilter = btn.dataset.filter;
    applyFilters();
  });
});

document.getElementById("searchInput").addEventListener("input", applyFilters);

// Inicia após data.js carregar
window.addEventListener("load", function() {
  if (typeof ALL_CONTACTS !== "undefined") {
    applyFilters();
  } else {
    document.getElementById("listContainer").innerHTML = '<div class="empty-state"><p>Erro ao carregar contatos. Verifique se o arquivo data.js está no repositório.</p></div>';
  }
});
</script>
</body>
</html>
