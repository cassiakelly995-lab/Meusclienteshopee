<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clientes Shopee — Cassia Kelly</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--orange:#FF6130;--dark:#0F0F0F;--surface:#1A1A1A;--surface2:#242424;--border:#2E2E2E;--text:#F0F0F0;--muted:#888;--green:#30D158;--tag:#2A1A0F}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--dark);color:var(--text);font-family:"DM Sans",sans-serif;min-height:100vh}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:18px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .logo{font-family:"Syne",sans-serif;font-weight:800;font-size:19px;color:var(--orange)}
  .logo span{color:var(--text);font-weight:700}
  .badge{background:var(--tag);border:1px solid var(--orange);color:var(--orange);font-size:11px;padding:4px 12px;border-radius:20px}
  .stats{display:flex;border-bottom:1px solid var(--border)}
  .stat{flex:1;padding:18px 28px;border-right:1px solid var(--border)}
  .stat:last-child{border-right:none}
  .stat-n{font-family:"Syne",sans-serif;font-size:28px;font-weight:800;color:var(--orange);line-height:1;margin-bottom:3px}
  .stat-l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .controls{padding:14px 28px;display:flex;gap:10px;align-items:center;border-bottom:1px solid var(--border)}
  .sw{flex:1;position:relative}
  .sw svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted)}
  #si{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px 10px 40px;color:var(--text);font-family:"DM Sans",sans-serif;font-size:14px;outline:none;transition:border-color .2s}
  #si:focus{border-color:var(--orange)}
  #si::placeholder{color:var(--muted)}
  .fb{background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:9px 16px;border-radius:10px;font-size:13px;cursor:pointer;font-family:"DM Sans",sans-serif;transition:all .2s;white-space:nowrap}
  .fb.active{background:var(--orange);border-color:var(--orange);color:#fff}
  .fb:hover:not(.active){border-color:var(--orange);color:var(--orange)}
  .ri{padding:9px 28px;font-size:13px;color:var(--muted);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .ri strong{color:var(--text)}
  .lc{overflow-y:auto;max-height:calc(100vh - 260px)}
  .lc::-webkit-scrollbar{width:3px}
  .lc::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  .ci{display:flex;align-items:center;justify-content:space-between;padding:12px 28px;border-bottom:1px solid var(--border);transition:background .15s}
  .ci:hover{background:var(--surface2)}
  .cl{display:flex;align-items:center;gap:12px}
  .av{width:38px;height:38px;border-radius:50%;background:var(--tag);border:1.5px solid var(--orange);display:flex;align-items:center;justify-content:center;font-family:"Syne",sans-serif;font-weight:700;font-size:12px;color:var(--orange);flex-shrink:0}
  .ph{font-size:14px;font-weight:500;cursor:pointer;letter-spacing:.3px}
  .ph:hover{color:var(--orange)}
  .dd{font-size:11px;color:var(--muted);margin-top:1px}
  .ca{display:flex;gap:7px;align-items:center}
  .bw{background:#25D366;color:#fff;border:none;padding:6px 12px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;font-family:"DM Sans",sans-serif;display:flex;align-items:center;gap:4px;text-decoration:none;transition:opacity .2s}
  .bw:hover{opacity:.85}
  .es{text-align:center;padding:50px 28px;color:var(--muted)}
  .pg{padding:14px 28px;display:flex;align-items:center;justify-content:center;gap:5px;border-top:1px solid var(--border);flex-wrap:wrap}
  .pb{background:var(--surface2);border:1px solid var(--border);color:var(--text);width:33px;height:33px;border-radius:7px;font-size:13px;cursor:pointer;font-family:"DM Sans",sans-serif;transition:all .2s;display:flex;align-items:center;justify-content:center}
  .pb.active{background:var(--orange);border-color:var(--orange);color:#fff;font-weight:600}
  .pb:hover:not(.active):not(:disabled){border-color:var(--orange)}
  .pb:disabled{opacity:.3;cursor:not-allowed}
  .pi{font-size:13px;color:var(--muted);padding:0 3px}
  .toast{position:fixed;bottom:22px;right:22px;background:var(--surface);border:1px solid var(--green);color:var(--green);padding:11px 18px;border-radius:10px;font-size:13px;font-weight:500;opacity:0;transform:translateY(8px);transition:all .3s;z-index:999;pointer-events:none}
  .toast.show{opacity:1;transform:translateY(0)}
  @media(max-width:600px){header,.stat,.controls,.ri,.ci{padding-left:14px;padding-right:14px}.stat-n{font-size:22px}.lc{max-height:calc(100vh - 300px)}}
</style>
</head>

var PP=100,fil=[],page=1,flt="all";

function init(){
  document.getElementById("sTotal").textContent=C.length.toLocaleString("pt-BR");
  document.getElementById("sStarred").textContent=C.filter(function(c){return c.starred}).length;
  go();
}

function go(){
  var q=document.getElementById("si").value.toLowerCase();
  fil=C.filter(function(c){
    return c.phone.toLowerCase().includes(q)&&(flt==="all"||(flt==="starred"&&c.starred));
  });
  page=1;
  draw();
}

function draw(){
  var tot=fil.length,tp=Math.max(1,Math.ceil(tot/PP)),s=(page-1)*PP,items=fil.slice(s,s+PP);
  document.getElementById("sFiltered").textContent=tot.toLocaleString("pt-BR");
  document.getElementById("rText").innerHTML="<strong>"+tot.toLocaleString("pt-BR")+"</strong> contatos";

  var lc=document.getElementById("lc"),h="";

  for(var i=0;i<items.length;i++){
    var c=items[i],ddd=(c.phone.match(/\((\d+)\)/)||[])[1]||"",ini=ddd.slice(-2)||"??",wa="https://wa.me/55"+c.phone.replace(/\D/g,"");
    h+='<div class="ci"><div class="cl"><div class="av">'+ini+'</div><div><div class="ph" onclick="cp(\''+c.phone.replace(/'/g,"\\'")+'\')" title="Copiar">'+c.phone+'</div><div class="dd">DDD '+ddd+'</div></div></div><div class="ca">'+(c.starred?'<span>⭐</span>':'')+'<a href="'+wa+'" target="_blank" class="bw"><svg width="12" height="12" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M11.999 2.001c-5.514 0-9.998 4.484-9.998 9.999 0 1.762.463 3.413 1.27 4.847L2 22l5.29-1.251A9.957 9.957 0 0 0 12 21.999c5.514 0 9.999-4.485 9.999-10C21.999 6.485 17.514 2 12 2z"/></svg>WhatsApp</a></div></div>';

function drawPg(tp){
  var pg=document.getElementById("pg");
  if(tp<=1){pg.innerHTML="";return;}
  var b='<button class="pb" onclick="gp('+(page-1)+')" '+(page===1?"disabled":"")+'>&#8249;</button>';
  var ps=[];
  if(tp<=7){for(var i=1;i<=tp;i++)ps.push(i);}
  else{
    ps=[1,2];
    if(page>4)ps.push("...");
    for(var i=Math.max(3,page-1);i<=Math.min(tp-2,page+1);i++)ps.push(i);
    if(page<tp-3)ps.push("...");
    ps.push(tp-1,tp);

  b+='<button class="pb" onclick="gp('+(page+1)+')" '+(page===tp?"disabled":"")+'>&#8250;</button>';
  pg.innerHTML=b;
}

function gp(p){var tp=Math.ceil(fil.length/PP);if(p<1||p>tp)return;page=p;document.getElementById("lc").scrollTop=0;draw();}
