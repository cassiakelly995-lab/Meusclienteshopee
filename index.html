<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Shopee Clientes</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --or:#EE4D2D;--or2:#FF6B35;--or3:#FF8C55;
  --bg:#0F0F0F;--bg2:#1A1A1A;--bg3:#242424;--bg4:#2E2E2E;
  --txt:#F5F0EB;--txt2:#A89B8C;--txt3:#6B5E52;
  --grn:#22C55E;--grn2:#16A34A;
  --card-border:rgba(255,255,255,0.07);
  --glow:rgba(238,77,45,0.35);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}

/* HEADER */
.header{background:linear-gradient(160deg,#1A0A06 0%,#2D1208 50%,#1A0A06 100%);border-bottom:1px solid rgba(238,77,45,0.2);padding:0;position:sticky;top:0;z-index:50;backdrop-filter:blur(20px)}
.header-glow{position:absolute;top:-40px;left:50%;transform:translateX(-50%);width:300px;height:80px;background:radial-gradient(ellipse,rgba(238,77,45,0.4),transparent 70%);pointer-events:none}
.header-inner{padding:14px 16px 10px;position:relative}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.logo-wrap{display:flex;align-items:center;gap:8px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--or),var(--or2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 4px 16px var(--glow)}
.logo-text{font-size:18px;font-weight:800;color:var(--txt);letter-spacing:-0.5px}
.logo-sub{font-size:11px;font-weight:500;color:var(--txt2);margin-top:-2px}
.counter-badge{margin-left:auto;background:rgba(238,77,45,0.15);border:1px solid rgba(238,77,45,0.3);color:var(--or3);font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;letter-spacing:0.3px}

/* SEARCH */
.search-box{position:relative;margin-bottom:10px}
.search-box input{width:100%;background:var(--bg3);border:1.5px solid var(--bg4);border-radius:12px;padding:12px 16px 12px 44px;font-size:15px;font-weight:500;font-family:'Outfit',sans-serif;color:var(--txt);outline:none;transition:border-color .2s,box-shadow .2s}
.search-box input::placeholder{color:var(--txt3)}
.search-box input:focus{border-color:rgba(238,77,45,0.5);box-shadow:0 0 0 3px rgba(238,77,45,0.1)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--txt3);font-size:17px}

/* ALPHABET */
.alpha-scroll{overflow-x:auto;white-space:nowrap;padding:0 0 8px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.alpha-scroll::-webkit-scrollbar{display:none}
.alpha-inner{display:inline-flex;gap:4px;padding:0 1px}
.alpha-btn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:5px 10px;font-size:12px;font-weight:700;color:var(--txt2);cursor:pointer;font-family:'Outfit',sans-serif;transition:all .15s;white-space:nowrap}
.alpha-btn.on{background:linear-gradient(135deg,var(--or),var(--or2));border-color:transparent;color:#fff;box-shadow:0 2px 10px var(--glow)}

/* STATS */
.stats{display:flex;gap:8px;padding:12px 16px 0}
.stat{background:var(--bg2);border:1px solid var(--card-border);border-radius:12px;padding:10px 14px;flex:1;text-align:center}
.stat-n{font-size:20px;font-weight:800;color:var(--or);line-height:1}
.stat-l{font-size:9px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:0.8px;margin-top:3px}
.page-info{font-size:11px;color:var(--txt3);font-weight:500;text-align:right;padding:8px 16px 4px}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:0 14px 24px}
@media(min-width:380px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:520px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:700px){.grid{grid-template-columns:repeat(4,1fr)}}
@media(min-width:900px){.grid{grid-template-columns:repeat(5,1fr)}}

/* CARD */
.card{background:var(--bg2);border:1px solid var(--card-border);border-radius:16px;padding:16px 12px 14px;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;transition:transform .15s,border-color .15s,box-shadow .15s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--or),var(--or2));opacity:0;transition:opacity .2s}
.card:active{transform:scale(0.95);border-color:rgba(238,77,45,0.4)}
.card:hover{border-color:rgba(238,77,45,0.3);box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.card:hover::before{opacity:1}

.avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--or),var(--or2));display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:800;color:#fff;box-shadow:0 4px 12px var(--glow);flex-shrink:0}
.card-name{font-size:12px;font-weight:600;color:var(--txt);text-align:center;line-height:1.35;word-break:break-word;width:100%}
.card-phone{font-size:10px;color:var(--txt3);font-weight:500}
.wa-tag{background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.25);color:#4ADE80;font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;display:flex;align-items:center;gap:4px;margin-top:1px}
.wa-dot{width:6px;height:6px;background:#22C55E;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* PAGINATION */
.pag{display:flex;justify-content:center;align-items:center;gap:5px;flex-wrap:wrap;padding:4px 14px 20px}
.pag button{background:var(--bg2);border:1px solid var(--card-border);border-radius:9px;padding:8px 14px;font-size:12px;font-weight:700;color:var(--txt2);cursor:pointer;font-family:'Outfit',sans-serif;transition:all .15s}
.pag button.on{background:linear-gradient(135deg,var(--or),var(--or2));color:#fff;border-color:transparent;box-shadow:0 2px 10px var(--glow)}
.pag button:disabled{opacity:.25;cursor:default}
.pag .dots{color:var(--txt3);font-weight:700;padding:0 4px}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.overlay.show{display:flex}
.modal{background:var(--bg2);border-radius:24px 24px 0 0;border:1px solid rgba(255,255,255,0.08);border-bottom:none;padding:20px 18px 36px;width:100%;max-width:500px;animation:slideUp .25s cubic-bezier(.34,1.56,.64,1)}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-drag{width:36px;height:4px;background:var(--bg4);border-radius:2px;margin:0 auto 18px}
.modal-avatar{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--or),var(--or2));display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff;margin:0 auto 10px;box-shadow:0 4px 16px var(--glow)}
.modal-name{font-size:16px;font-weight:800;color:var(--txt);text-align:center;margin-bottom:3px}
.modal-phone{font-size:13px;color:var(--txt2);text-align:center;margin-bottom:16px}
.modal textarea{width:100%;background:var(--bg3);border:1.5px solid var(--bg4);border-radius:12px;padding:12px 14px;font-size:14px;font-family:'Outfit',sans-serif;color:var(--txt);resize:none;height:90px;outline:none;transition:border-color .2s}
.modal textarea:focus{border-color:rgba(238,77,45,0.4)}
.modal-btns{display:flex;gap:8px;margin-top:12px}
.btn-cancel{flex:1;padding:14px;background:var(--bg3);border:1px solid var(--card-border);border-radius:12px;font-size:14px;font-weight:700;color:var(--txt2);cursor:pointer;font-family:'Outfit',sans-serif}
.btn-send{flex:2;padding:14px;background:linear-gradient(135deg,var(--grn),var(--grn2));border:none;border-radius:12px;font-size:14px;font-weight:800;color:#fff;cursor:pointer;font-family:'Outfit',sans-serif;display:flex;align-items:center;justify-content:center;gap:7px;box-shadow:0 4px 14px rgba(34,197,94,0.3)}

/* EMPTY */
.empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--txt3)}
.empty-icon{font-size:44px;margin-bottom:12px;opacity:.5}
.empty h3{font-size:15px;font-weight:700;color:var(--txt2);margin-bottom:5px}

/* FADE IN CARDS */
.card{animation:fadeIn .2s ease both}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
