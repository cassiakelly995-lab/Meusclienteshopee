<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopee Clientes</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f5f5f5;color:#222;min-height:100vh}
header{background:linear-gradient(135deg,#EE4D2D,#FF7337);position:sticky;top:0;z-index:100;box-shadow:0 4px 16px rgba(238,77,45,.35);padding:12px 14px 8px}
.hrow1{display:flex;align-items:center;margin-bottom:9px}
.logo{font-size:19px;font-weight:900;color:#fff}
.bdg{margin-left:auto;background:rgba(255,255,255,.25);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
#q{width:100%;padding:11px 14px;border-radius:10px;border:none;font-size:15px;font-weight:700;color:#333;outline:none}
.abar{display:flex;gap:3px;flex-wrap:wrap;margin-top:7px}
.abar button{background:rgba(255,255,255,.2);border:none;border-radius:5px;padding:3px 7px;font-size:11px;font-weight:700;color:#fff;cursor:pointer}
.abar button.on{background:#fff;color:#EE4D2D}
.stats{display:flex;gap:8px;padding:11px 13px 0}
.chip{background:#fff;border-radius:9px;padding:7px 12px;text-align:center;border:1.5px solid #eee;box-shadow:0 2px 6px rgba(0,0,0,.06)}
.chip b{display:block;font-size:17px;font-weight:900;color:#EE4D2D}
.chip small{font-size:9px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.4px}
.inf{font-size:11px;color:#bbb;font-weight:700;text-align:right;padding:9px 14px 3px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;padding:0 11px 28px}
@media(max-width:450px){.grid{grid-template-columns:repeat(2,1fr)}}
.card{background:#fff;border-radius:12px;padding:13px 10px 11px;display:flex;flex-direction:column;align-items:center;gap:5px;border:1.5px solid #eee;cursor:pointer;box-shadow:0 2px 7px rgba(0,0,0,.06);-webkit-tap-highlight-color:rgba(238,77,45,.15)}
.card:active{transform:scale(.96);background:#fff5f3}
.av{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#EE4D2D,#FF7337);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;color:#fff;flex-shrink:0}
.cn{font-size:11px;font-weight:700;text-align:center;line-height:1.3;word-break:break-word}
.cp{font-size:10px;color:#aaa;font-weight:600}
.wb{background:#25D366;color:#fff;font-size:10px;font-weight:800;padding:4px 11px;border-radius:20px;margin-top:2px}
.pag{display:flex;justify-content:center;gap:5px;flex-wrap:wrap;padding:6px 12px 22px}
.pag button{background:#fff;border:1.5px solid #ddd;border-radius:8px;padding:7px 13px;font-size:12px;font-weight:700;cursor:pointer}
.pag button.on{background:#EE4D2D;color:#fff;border-color:#EE4D2D}
.pag button:disabled{opacity:.3;cursor:default}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center}
.ov.show{display:flex}
.modal{background:#fff;border-radius:18px 18px 0 0;padding:22px 18px 32px;width:100%;max-width:480px}
.modal h3{font-size:15px;font-weight:900;color:#EE4D2D;margin-bottom:4px}
.modal p{font-size:12px;color:#aaa;margin-bottom:14px}
.modal textarea{width:100%;border:1.5px solid #ddd;border-radius:9px;padding:11px;font-size:13px;font-family:inherit;resize:none;height:95px;outline:none}
.mbs{display:flex;gap:8px;margin-top:10px}
.mbs button{flex:1;padding:12px;border-radius:9px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;border:none}
.mbs .cc{background:#f0f0f0;color:#555;flex:.55}
.mbs .ss{background:#25D366;color:#fff;flex:1.45}
</style>
</head>
<body>
<header>
  <div class="hrow1">
    <div class="logo">&#128722; Shopee Clientes</div>
    <span class="bdg" id="bdg">...</span>
  </div>
  <input type="text" id="q" placeholder="Buscar cliente..." oninput="buscar()">
  <div class="abar" id="abar"></div>
</header>
<div class="stats">
  <div class="chip"><b id="st">0</b><small>Total</small></div>
  <div class="chip"><b id="ss">0</b><small>Exibindo</small></div>
  <div class="chip"><b id="sp">1</b><small>Pagina</small></div>
</div>
<div class="inf" id="inf"></div>
<div class="grid" id="grid"></div>
<div class="pag" id="pag"></div>
<div class="ov" id="ov" onclick="if(event.target===this)fch()">
  <div class="modal">
    <h3 id="mn">Enviar</h3>
    <p id="mf"></p>
    <textarea id="mt">Ola! Temos ofertas incriveis na Shopee esperando por voce! Aproveite os melhores precos com entrega rapida!</textarea>
    <div class="mbs">
      <button class="cc" onclick="fch()">Cancelar</button>
      <button class="ss" onclick="env()">Enviar no WhatsApp</button>
    </div>
  </div>
</div>
